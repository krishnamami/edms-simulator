AWSTemplateFormatVersion: "2010-09-09"
Description: EDMS Simulator - ECS Fargate cluster, ALB, service for the API.

Parameters:
  EnvironmentName:
    Type: String
    Default: edms-simulator
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  ContainerImage:
    Type: String
    Description: ECR image URI (e.g. ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/edms-simulator:latest)
  DesiredCount:
    Type: Number
    Default: 2
  TaskCpu:
    Type: String
    Default: "512"
  TaskMemory:
    Type: String
    Default: "1024"
  DBSecretArn:
    Type: String
  RedisSecretArn:
    Type: String
  ApiKeySecretArn:
    Type: String
  TaskRoleArn:
    Type: String
    Description: ARN of an externally-managed IAM role for ECS tasks (app permissions). Pre-create the role outside this stack.

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${EnvironmentName}-cluster
      CapacityProviders: [FARGATE, FARGATE_SPOT]

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${EnvironmentName}
      RetentionInDays: 30

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DBSecretArn
                  - !Ref RedisSecretArn
                  - !Ref ApiKeySecretArn

  # TaskRole is managed externally and passed in via the TaskRoleArn parameter
  # so that out-of-band changes to the role (e.g. policy attachments by an
  # admin) don't drift relative to the stack. Pre-create the role with the
  # ecs-tasks.amazonaws.com trust relationship before deploying.

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ALB ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS task ingress from ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-alb
      Subnets: !Ref PublicSubnetIds
      SecurityGroups: [!Ref AlbSecurityGroup]
      Scheme: internet-facing

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-tg
      Port: 8001
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref EnvironmentName
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !Ref TaskRoleArn
      ContainerDefinitions:
        - Name: !Ref EnvironmentName
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8001
              Protocol: tcp
          Environment:
            - { Name: ENVIRONMENT,        Value: production }
            - { Name: USE_AWS_SECRETS,    Value: "true" }
            - { Name: USE_AWS_SQS,        Value: "true" }
            - { Name: AWS_REGION,         Value: !Ref AWS::Region }
            - { Name: USE_LOCAL_STORAGE,  Value: "false" }
            - { Name: USE_FAKE_REDIS,     Value: "false" }
          Secrets:
            - { Name: DB_CONNECTION,    ValueFrom: !Ref DBSecretArn }
            - { Name: REDIS_CONNECTION, ValueFrom: !Ref RedisSecretArn }
            - { Name: API_KEY,          ValueFrom: !Ref ApiKeySecretArn }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 30

  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Sub ${EnvironmentName}-service
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref TaskDefinition
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups: [!Ref TaskSecurityGroup]
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: !Ref EnvironmentName
          ContainerPort: 8001
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !Ref Service
  AlbDnsName:
    Value: !GetAtt Alb.DNSName
