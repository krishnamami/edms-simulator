AWSTemplateFormatVersion: "2010-09-09"
Description: EDMS Simulator - Secrets Manager entries.

Parameters:
  EnvironmentName:
    Type: String
    Default: edms-simulator

Resources:
  AuroraSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: edms/aurora/credentials
      Description: Aurora master + app DB credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username":"edms_admin","host":"REPLACE","port":5432,"database":"edms"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\\'

  RedisSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: edms/redis/endpoint
      SecretString: '{"host":"REPLACE","port":6379,"password":""}'

  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: edms/api/keys
      GenerateSecretString:
        SecretStringTemplate: '{"decision_os_api_key":""}'
        GenerateStringKey: decision_os_api_key
        PasswordLength: 48
        ExcludePunctuation: true

Outputs:
  AuroraSecretArn:
    Value: !Ref AuroraSecret
    Export: { Name: !Sub "${EnvironmentName}-aurora-secret" }
  RedisSecretArn:
    Value: !Ref RedisSecret
    Export: { Name: !Sub "${EnvironmentName}-redis-secret" }
  ApiKeySecretArn:
    Value: !Ref ApiKeySecret
    Export: { Name: !Sub "${EnvironmentName}-api-key-secret" }
