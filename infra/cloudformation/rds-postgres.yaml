AWSTemplateFormatVersion: "2010-09-09"
Description: EDMS Simulator - RDS Postgres (single AZ, no proxy) for initial deploy.

Parameters:
  EnvironmentName:
    Type: String
    Default: edms-simulator
  VpcId:
    Type: AWS::EC2::VPC::Id
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  DBMasterUsername:
    Type: String
    Default: edms_admin
  DBSecretArn:
    Type: String
    Description: ARN of secret in Secrets Manager (must contain a "password" key)
  DBSecurityGroupIngressCidr:
    Type: String
    Default: 10.0.0.0/16

Resources:
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS Postgres ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref DBSecurityGroupIngressCidr
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-rds-sg

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: RDS Postgres subnet group
      SubnetIds: !Ref PrivateSubnetIds

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: postgres
      EngineVersion: "15.8"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: "20"
      DBName: edms
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DBSecretArn}:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: [!Ref DBSecurityGroup]
      MultiAZ: false
      PubliclyAccessible: false
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: true

Outputs:
  DBEndpoint:
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub ${EnvironmentName}-db-endpoint
  DBPort:
    Value: !GetAtt RDSInstance.Endpoint.Port
    Export:
      Name: !Sub ${EnvironmentName}-db-port
  DBSecretArn:
    Value: !Ref DBSecretArn
    Export:
      Name: !Sub ${EnvironmentName}-db-secret-arn
